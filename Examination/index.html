<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>My Dream Villa – VR Experience</title>
  <script src="aframe-inspector.min.js"></script>
  <script src="script/aframe.js"></script>
  <script src="script/aframe-extras.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family:'Segoe UI', sans-serif; }

    #loading-screen {
      position:fixed; inset:0; background:#0a0a0a;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:9999; transition:opacity 1s ease;
    }
    #loading-screen h1 {
      color:#c8a860; font-size:2.2rem; letter-spacing:0.3em;
      text-transform:uppercase; margin-bottom:10px;
    }
    #loading-screen p { color:#888; font-size:0.9rem; letter-spacing:0.15em; margin-bottom:40px; }
    .loader-bar {
      width:280px; height:3px; background:#1a1a1a; border-radius:2px; overflow:hidden;
    }
    .loader-fill {
      height:100%; width:0%; background:linear-gradient(90deg,#c8a860,#ffd080);
      border-radius:2px; animation:load 3s ease forwards;
    }
    @keyframes load { to { width:100%; } }

    #ui-overlay {
      position:fixed; top:0; left:0; right:0;
      padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
      background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      z-index:999; pointer-events:none;
    }
    #nav-buttons { display:flex; gap:8px; flex-wrap:wrap; pointer-events:all; }
    .nav-btn {
      background:rgba(10,10,10,0.75);
      color:#e8d5a0; border:1px solid rgba(200,168,96,0.35);
      padding:7px 15px; border-radius:20px; cursor:pointer;
      font-size:12px; letter-spacing:0.05em;
      backdrop-filter:blur(8px);
      transition:all 0.2s; pointer-events:all;
    }
    .nav-btn:hover {
      background:rgba(200,168,96,0.2);
      border-color:rgba(200,168,96,0.7);
      color:#ffd080;
    }
    #villa-title {
      color:#c8a860; font-size:1rem; letter-spacing:0.25em;
      text-transform:uppercase; text-shadow:0 2px 8px rgba(0,0,0,0.8);
    }
    #hud {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.65); color:#c8a860;
      padding:8px 20px; border-radius:20px;
      font-size:12px; letter-spacing:0.08em;
      backdrop-filter:blur(6px);
      border:1px solid rgba(200,168,96,0.2);
      z-index:999; pointer-events:none;
    }
    #hint {
      position:fixed; top:70px; right:20px;
      background:rgba(0,0,0,0.65); color:#aaa;
      padding:10px 14px; border-radius:12px;
      font-size:11px; line-height:1.8;
      backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,0.08);
      z-index:999; pointer-events:none;
      max-width:200px;
    }
  </style>
</head>

  <!-- ======= SCRIPTS ======= -->
  <script>
    // Hide loading screen after scene loads
    document.querySelector('a-scene').addEventListener('loaded', function() {
      setTimeout(function() {
        var ls = document.getElementById('loading-screen');
        ls.style.opacity = '0';
        setTimeout(function(){ ls.style.display='none'; }, 1000);
      }, 2800);
    });

    // Teleport
    function teleport(x,y,z) {
      var rig = document.getElementById('rig');
      rig.setAttribute('position', x+' 0 '+z);
    }

    // Fan toggle
    AFRAME.registerComponent('fan-toggle', {
      schema:{ target:{type:'selector'}, running:{default:false} },
      init:function(){
        var self = this;
        this.el.addEventListener('click', function(){
          self.data.running = !self.data.running;
          var fan = self.data.target;
          if(self.data.running){
            fan.setAttribute('animation','property:rotation; to:0 360 0; loop:true; dur:700; easing:linear');
            self.el.setAttribute('material','color:#00e676');
          } else {
            fan.removeAttribute('animation');
            self.el.setAttribute('material','color:#ff1744');
          }
        });
      }
    });

  </script>

    // Gate toggle
<script>
AFRAME.registerComponent('gate-toggle', {
  schema: { open: { default: false } },

  init: function () {
    var self = this;

    var gateL = document.getElementById('gate-left-hinge');
    var gateR = document.getElementById('gate-right-hinge');

    this.el.addEventListener('click', function () {
      self.data.open = !self.data.open;

      if (self.data.open) {
        gateL.setAttribute('animation',
          'property: rotation; to: 0 90 0; dur: 1800; easing: easeInOutQuad');

        gateR.setAttribute('animation',
          'property: rotation; to: 0 -90 0; dur: 1800; easing: easeInOutQuad');

        self.el.setAttribute('material', 'color', '#00e676');

      } else {
        gateL.setAttribute('animation',
          'property: rotation; to: 0 0 0; dur: 1800; easing: easeInOutQuad');

        gateR.setAttribute('animation',
          'property: rotation; to: 0 0 0; dur: 1800; easing: easeInOutQuad');

        self.el.setAttribute('material', 'color', '#ff1744');
      }
    });
  }
});
</script>
